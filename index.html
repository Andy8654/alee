<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre estrellas</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="universe">

    <div class="intro" id="intro">
      <h1>
        Hay cosas que no siempre logro decir...<br>
        así que esta vez decidí escribirlas en el universo.
      </h1>

      <button onclick="startJourney()">
        Toca una estrella ✨
      </button>
    </div>


    <div class="star"
      style="top:20%; left:25%;"
      data-msg="<b>Perdón</b><br><br>Por mis errores, por mis silencios y por lo que no supe manejar.">
    </div>

    <div class="star"
      style="top:35%; left:70%;"
      data-msg="<b>Sinceridad</b><br><br>Nada de esto nace por obligación... nace porque realmente me importas.">
    </div>

    <div class="star"
      style="top:60%; left:30%;"
      data-msg="<b>Cambio</b><br><br>No prometo perfección, pero sí aprender de lo que pasó.">
    </div>

    <div class="star"
      style="top:70%; left:65%;"
      data-msg="<b>Respeto</b><br><br>Entiendo que sanar también necesita espacio.">
    </div>

    <div class="star"
      style="top:45%; left:50%;"
      data-msg="<b>Gracias</b><br><br>Incluso en momentos difíciles, me enseñaste cosas valiosas.">
    </div>

    <div class="star final"
      style="top:15%; left:50%;"
      data-msg='<b>✨ Mi estrella más importante ✨</b><br><br>No hice esta página para borrar lo ocurrido.<br>La hice porque algunas personas merecen algo más que un perdón escrito deprisa.<br><br>Y tú... para mí eres una de ellas. <br><br>Gracias por ser parte de mi universo. <br><br>Te quiero.</b> <br><br>❤️ <br><br>PD: Si quieres hablar, aquí estoy y perdon por todo solo pido una oportunidad solo una :c.'>
    </div>

  </div>


  <div class="message" id="message">
    <div class="box" id="box"></div>
  </div>


  <script src="script.js"></script>

</body>
</html>
